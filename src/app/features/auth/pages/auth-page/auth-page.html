<section class="flex min-h-[80vh] items-center justify-center">
  <div class="card w-full max-w-sm border border-base-300 bg-base-100 shadow-sm">
    <div class="card-body gap-4">

      <!-- El titulo cambia segun el modo activo. -->
      <h2 class="text-2xl font-black tracking-tight">
        @if (isLogin()) { Iniciar sesion } @else { Crear cuenta }
      </h2>

      <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="space-y-4">

        <div class="form-control">
          <label class="label" for="email">
            <span class="label-text">Correo electronico</span>
          </label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="usuario@ejemplo.com"
            class="input input-bordered w-full"
            [class.input-error]="authForm.get('email')?.invalid && authForm.get('email')?.touched"
          />
        </div>

        <div class="form-control">
          <label class="label" for="password">
            <span class="label-text">Contrasena</span>
          </label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••"
            class="input input-bordered w-full"
            [class.input-error]="authForm.get('password')?.invalid && authForm.get('password')?.touched"
          />
        </div>

        <!-- Error de Firebase mapeado a mensaje legible. -->
        @if (errorMessage()) {
          <div class="alert alert-error py-2 text-sm">
            <span>{{ errorMessage() }}</span>
          </div>
        }

        <button
          type="submit"
          class="btn btn-primary w-full"
          [disabled]="authForm.invalid || isLoading()"
        >
          @if (isLoading()) {
            <span class="loading loading-spinner loading-sm"></span>
          } @else if (isLogin()) {
            Ingresar
          } @else {
            Registrarse
          }
        </button>
        <div class="divider">O</div>

<button
  type="button"
  class="btn btn-outline w-full"
  (click)="loginGoogle()"
>
  <svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 48 48"
    class="h-5 w-5"
  >
    <path
      fill="#FFC107"
      d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"
    />
    <path
      fill="#FF3D00"
      d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"
    />
    <path
      fill="#4CAF50"
      d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.6 5.1C9.5 39.5 16.2 44 24 44z"
    />
    <path
      fill="#1976D2"
      d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.4 5.5-6.6 6.8l6.2 5.2C39.7 36.5 44 30.8 44 24c0-1.3-.1-2.7-.4-3.5z"
    />
  </svg>

  Continuar con Google
</button>
      </form>

      <!-- Enlace para alternar entre login y registro. -->
      <p class="text-center text-sm text-base-content/60">
        @if (isLogin()) {
          ¿No tienes cuenta?
          <button class="link link-primary" (click)="toggleMode()">Registrate aqui</button>
        } @else {
          ¿Ya tienes cuenta?
          <button class="link link-primary" (click)="toggleMode()">Inicia sesion</button>
        }
      </p>

    </div>
  </div>
</section>
